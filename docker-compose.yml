services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gooddesign
      POSTGRES_USER: gd_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gd_user -d gooddesign"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://gd_user:${DB_PASSWORD:-changeme}@postgres:5432/gooddesign
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      SALLA_API_URL: ${SALLA_API_URL:-https://api.salla.dev/admin/v2}
      SALLA_ACCESS_TOKEN: ${SALLA_ACCESS_TOKEN}
      SALLA_REFRESH_TOKEN: ${SALLA_REFRESH_TOKEN}
      SALLA_CLIENT_ID: ${SALLA_CLIENT_ID}
      SALLA_CLIENT_SECRET: ${SALLA_CLIENT_SECRET}
      SALLA_WEBHOOK_SECRET: ${SALLA_WEBHOOK_SECRET}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-me-south-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT:-}

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${DASHBOARD_API_URL:-http://localhost:3000/api/admin}
      NEXT_PUBLIC_SOCKET_URL: ${DASHBOARD_SOCKET_URL:-http://localhost:3000}

volumes:
  pgdata:
  redisdata:
